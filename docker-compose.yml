services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ironclad
      POSTGRES_PASSWORD: ironclad
      POSTGRES_DB: ironclad_auth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironclad -d ironclad_auth"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://ironclad:ironclad@postgres:5432/ironclad_auth
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
