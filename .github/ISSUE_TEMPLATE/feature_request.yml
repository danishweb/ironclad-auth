name: Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
body:
  - type: markdown
    attributes:
      value: |
        Share context and the outcome you want. Maintainer response time may vary.
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What pain point or gap does this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work (API shape, UX, data model, etc.)?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
    validations:
      required: false
