name: Bug Report
description: Report unexpected behavior or a regression
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands, requests, or sequence of actions.
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment (optional)
      description: e.g. Node version, OS, Postgres version, deployment target
    validations:
      required: false
