name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ironclad
          POSTGRES_PASSWORD: ironclad
          POSTGRES_DB: ironclad_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ironclad -d ironclad_auth"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://ironclad:ironclad@localhost:5432/ironclad_auth
      KEY_ENCRYPTION_SECRET: ci-key-encryption-secret-16+
      IRONCLAD_ISSUER: https://ironclad.ci.example/
      IRONCLAD_TOKEN_AUDIENCE: https://resources.ci.example/
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
      - run: pnpm exec playwright install chromium --with-deps
      - run: pnpm e2e
        env:
          E2E_SKIP_DB_PREP: "1"
