name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ironclad
          POSTGRES_PASSWORD: ironclad
          POSTGRES_DB: ironclad_auth
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ironclad -d ironclad_auth"
          --health-interval 4s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://ironclad:ironclad@localhost:5432/ironclad_auth
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm db:migrate
      - run: pnpm db:seed
